name: CI/CD - Auto Deploy and Release

on:
  push:
    branches:
      - "main"
      - "development"
  pull_request:
    branches:
      - "main"
      - "development"

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  AWS_REGION: "sa-east-1"
  EB_APP_NAME: "FoodClub-App"

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Clean npm cache
        run: |
          npm cache clean --force
          rm -rf ~/.npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test -- --passWithNoTests
      # - name: Run linter
      #   run: npm run lint

  security:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Security Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: "javascript-typescript"

      - name: Build for CodeQL
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "/language:javascript-typescript"

  build:
    name: Build Application
    needs: [validate, security]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci
      - name: Build production code
        run: npm run build
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-artifacts
          path: |
            dist
            package.json
            package-lock.json

  version:
    name: Generate Semantic Version
    needs: build
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate version from commits
        id: version
        run: |
          git fetch --tags
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$latest_tag" ]; then
            # Primeira versão - sem tags existentes
            major=0
            minor=0
            patch=1
            commits=$(git log --pretty=format:"%s")
          else
            major=$(echo $latest_tag | cut -d. -f1 | tr -d 'v')
            minor=$(echo $latest_tag | cut -d. -f2)
            patch=$(echo $latest_tag | cut -d. -f3)

            # Analisa commits desde a última tag
            commits=$(git log $latest_tag..HEAD --pretty=format:"%s")
          fi

          if echo "$commits" | grep -qE "BREAKING|MAJOR"; then
            major=$((major + 1)); minor=0; patch=0;
          elif echo "$commits" | grep -qE "feat|feature|MINOR"; then
            minor=$((minor + 1)); patch=0;
          elif echo "$commits" | grep -qE "fix|chore|docs|style|refactor|perf|test"; then
            patch=$((patch + 1));
          fi

          base_version="v$major.$minor.$patch"

          if [ "${{ github.ref_name }}" == "development" ]; then
            new_version="${base_version}.dev.${{ github.run_number }}"
          else
            new_version="${base_version}"
          fi

          echo "Generated Version: $new_version"
          echo "version=${new_version}" >> $GITHUB_OUTPUT
  docker_build_push_acr:
    name: Build and Push to ACR
    needs: [build, version, migrate]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: |
          echo ${{ secrets.ACR_PASSWORD }} | docker login acrfoodclub.azurecr.io -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Set Image Tag
        id: image_tag
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "IMAGE_TAG=prod" >> $GITHUB_ENV
            echo "tag=prod" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=hml" >> $GITHUB_ENV
            echo "tag=hml" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: |
            foodclub-api:${{ steps.image_tag.outputs.tag }}
            foodclub-api:${{ needs.version.outputs.new_version }}
          platforms: linux/amd64

  migrate:
    name: Run DB Migrations
    needs: [build, version]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci
      - name: Build production code
        run: npm run build
      - name: Run DB migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_SSL: ${{ secrets.DB_SSL }}

      # TODO: Enable Trivy scan after updating dependencies
      # - name: Run Trivy vulnerability scan
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: foodclub-api:${{ steps.image_tag.outputs.tag }}
      #     format: 'table'
      #     exit-code: '1'
      #     ignore-unfixed: true
      #     vuln-type: 'os,library'
      #     severity: 'HIGH,CRITICAL'

      - name: Tag and push Docker image to ACR
        run: |
          docker tag foodclub-api:${IMAGE_TAG} acrfoodclub.azurecr.io/foodclub-api:${IMAGE_TAG}
          docker tag foodclub-api:${{ needs.version.outputs.new_version }} acrfoodclub.azurecr.io/foodclub-api:${{ needs.version.outputs.new_version }}
          docker push acrfoodclub.azurecr.io/foodclub-api:${IMAGE_TAG}
          docker push acrfoodclub.azurecr.io/foodclub-api:${{ needs.version.outputs.new_version }}

  deploy_azure:
    name: Deploy to Azure Container Apps
    needs: [docker_build_push_acr, version]
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Deployment Env
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "APP_NAME=api-foodclub-prod" >> $GITHUB_ENV
            echo "IMAGE_TAG=prod" >> $GITHUB_ENV
          else
            echo "APP_NAME=api-foodclub-hml" >> $GITHUB_ENV
            echo "IMAGE_TAG=hml" >> $GITHUB_ENV
          fi

      - name: Update Container App
        run: |
          az containerapp update \
            --name $APP_NAME \
            --resource-group rg-foodclub \
            --image acrfoodclub.azurecr.io/foodclub-api:${IMAGE_TAG}

      - name: Run DB migrations as Container Apps job
        run: |
          bash infra/azure/run-containerapp-migration.sh acrfoodclub.azurecr.io/foodclub-api:${IMAGE_TAG}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_SSL: ${{ secrets.DB_SSL }}

  create_release:
    name: Create GitHub Release
    needs: [deploy_azure, version]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Enhanced Changelog
        id: generate_changelog
        run: |
          # Define a data da release
          release_date=$(date '+%d/%m/%Y às %H:%M')

          # Pega o último tag se existir
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$latest_tag" ]; then
            # Se não há tags, pega todos os commits (excluindo merges)
            commits=$(git log --pretty=format:"* **%s** - %an (%h)" --since="1 week ago" --no-merges)
          else
            # Se há tags, pega commits desde o último tag (excluindo merges)
            commits=$(git log --pretty=format:"* **%s** - %an (%h)" $latest_tag..HEAD --no-merges)
          fi

          # Categoriza os commits (ignorando commits de merge e duplicatas)
          features=$(echo "$commits" | grep -E "feat|feature" | grep -v "Merge pull request" || echo "")
          fixes=$(echo "$commits" | grep -E "fix|bugfix" | grep -v "Merge pull request" || echo "")
          improvements=$(echo "$commits" | grep -E "chore|refactor|perf|style" | grep -v "Merge pull request" || echo "")
          docs=$(echo "$commits" | grep -E "docs|doc" | grep -v "Merge pull request" || echo "")

          # Cria o changelog estruturado
          {
            echo "changelog<<EOF"
            echo "# Foodclub Backend - Version ${{ needs.version.outputs.new_version }}"
            echo ""
            echo "**📅 Release Date:** $release_date"
            echo "**🌟 Branch:** ${{ github.ref_name }}"
            echo "**💻 Commit:** [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"
            echo ""

            if [ ! -z "$features" ]; then
              echo "## ✨ New Features"
              echo "$features"
              echo ""
            fi

            if [ ! -z "$fixes" ]; then
              echo "## 🐛 Bug Fixes"
              echo "$fixes"
              echo ""
            fi

            if [ ! -z "$improvements" ]; then
              echo "## 🔧 Improvements and Optimizations"
              echo "$improvements"
              echo ""
            fi

            if [ ! -z "$docs" ]; then
              echo "## 📚 Documentation"
              echo "$docs"
              echo ""
            fi

            echo "## 🔗 Useful Links"
            echo "- [📋 Full Changelog](https://github.com/${{ github.repository }}/compare/$latest_tag...${{ needs.version.outputs.new_version }})"
            echo "- [🏗️ Deployment Pipeline](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "---"
            echo "*Automatic generated release - GitHub Actions*"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Cria a tag localmente
          git tag -a "${{ needs.version.outputs.new_version }}" -m "🏷️ Release ${{ needs.version.outputs.new_version }}

          📅 Data: $(date '+%d/%m/%Y às %H:%M')
          🌟 Branch: ${{ github.ref_name }}
          💻 Commit: ${{ github.sha }}
          🚀 Deploy: Automático via GitHub Actions"

          # Push da tag para o repositório
          git push origin "${{ needs.version.outputs.new_version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_version }}
          name: "FoodClub Backend ${{ needs.version.outputs.new_version }}"
          body: ${{ steps.generate_changelog.outputs.changelog }}
          prerelease: ${{ github.ref == 'refs/heads/development' }}
          generate_release_notes: false
          make_latest: ${{ github.ref == 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify_failure:
    name: Send Notification
    needs:
      [validate, build, deploy_azure, docker_build_push_acr, create_release]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send email on failure
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: true
          username: ${{ secrets.FOODCLUB_EMAIL }}
          password: ${{ secrets.FOODCLUB_EMAIL_PASSWORD }}
          subject: "❌ Falha no Pipeline - FoodClub Server"
          to: seu-email-de-notificacao@exemplo.com
          from: GitHub Actions <${{ secrets.NOTIFICATION_EMAIL }}>
          html_body: |
            <h2>Falha no Pipeline do FoodClub Server</h2>
            <p>Ocorreu uma falha no pipeline de CI/CD para a branch <strong>${{ github.ref_name }}</strong>.</p>
            <p>Para ver os detalhes, <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">clique aqui</a>.</p>
