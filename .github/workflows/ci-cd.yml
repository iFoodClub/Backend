name: CI/CD - Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - "main"
      - "development"
  pull_request:
    branches:
      - "main"
      - "development"

# SOLUÇÃO PARA O PROBLEMA 2: Adiciona permissão de escrita
permissions:
  contents: write

env:
  NODE_VERSION: '18'
  AWS_REGION: 'sa-east-1'
  EB_APP_NAME: 'FoodClub-App'

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      # - name: Run linter
      #   run: npm run lint

  build:
    name: Build Application
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build production code
        run: npm run build
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-artifacts
          path: |
            dist
            package.json
            package-lock.json

  version:
    name: Generate Semantic Version
    needs: build
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate version from commits
        id: version
        run: |
          git fetch --tags
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          major=$(echo $latest_tag | cut -d. -f1 | tr -d 'v')
          minor=$(echo $latest_tag | cut -d. -f2)
          patch=$(echo $latest_tag | cut -d. -f3)
          
          commits=$(git log $latest_tag..HEAD --pretty=format:"%s")
          
          # SOLUÇÃO PARA O PROBLEMA 1: Lógica de versionamento aprimorada
          if echo "$commits" | grep -qE "BREAKING|MAJOR"; then
            major=$((major + 1)); minor=0; patch=0;
          elif echo "$commits" | grep -qE "feat|feature|MINOR"; then
            minor=$((minor + 1)); patch=0;
          elif echo "$commits" | grep -qE "fix|chore|docs|style|refactor|perf|test"; then
            patch=$((patch + 1));
          fi
          
          base_version="v$major.$minor.$patch"
          
          if [ "${{ github.ref_name }}" == "development" ]; then
            new_version="${base_version}-dev.${{ github.run_number }}"
          else
            new_version="${base_version}"
          fi
          
          echo "Generated Version: $new_version"
          echo "version=${new_version}" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to AWS
    needs: [build, version]
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    steps:
      - name: Determine Environment Name
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "EB_ENV_NAME=FoodClub-App-prod" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" == "refs/heads/development" ]; then
            echo "EB_ENV_NAME=FoodClub-App-env" >> $GITHUB_ENV
          fi
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-artifacts
          path: .
      - name: Generate deployment package
        run: zip -r deploy.zip .
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ env.EB_APP_NAME }}
          environment_name: ${{ env.EB_ENV_NAME }}
          version_label: ${{ needs.version.outputs.new_version }}
          region: ${{ env.AWS_REGION }}
          deployment_package: deploy.zip
          wait_for_environment_recover: true

  tag:
    name: Create Git Tag
    needs: [deploy, version]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create and push tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "${{ needs.version.outputs.new_version }}" -m "Release ${{ needs.version.outputs.new_version }}"
          git push origin "${{ needs.version.outputs.new_version }}"

  notify:
    name: Send Notification
    needs: [validate, build, deploy, tag]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send email on failure
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: true
          username: ${{ secrets.FOODCLUB_EMAIL }}
          password: ${{ secrets.FOODCLUB_EMAIL_PASSWORD }}
          subject: '❌ Falha no Pipeline - FoodClub Server'
          to: seu-email-de-notificacao@exemplo.com
          from: GitHub Actions <${{ secrets.NOTIFICATION_EMAIL }}>
          html_body: |
            <h2>Falha no Pipeline do FoodClub Server</h2>
            <p>Ocorreu uma falha no pipeline de CI/CD para a branch <strong>${{ github.ref_name }}</strong>.</p>
            <p>Para ver os detalhes, <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">clique aqui</a>.</p>