version: '3.8'

services:
  # Serviço do backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foodclub-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=foodclub
      - JWT_SECRET=${JWT_SECRET:-local_development_secret_key_123}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-3600}
    depends_on:
      - db
    networks:
      - foodclub-network
    restart: unless-stopped

  # Serviço do banco de dados
  db:
    image: postgres:15-alpine
    container_name: foodclub-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=foodclub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - foodclub-network
    restart: unless-stopped

  # Interface web para o banco de dados
  adminer:
    image: adminer
    container_name: foodclub-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - foodclub-network
    depends_on:
      - db

networks:
  foodclub-network:
    driver: bridge

volumes:
  postgres_data: 