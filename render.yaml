# Configuração do Render para deploy automático
# Documentação: https://render.com/docs/yaml-spec

services:
  # Banco de dados PostgreSQL
  - type: pserv
    name: foodclub-db
    env: docker
    plan: free # Opções: free, starter, standard, pro
    region: oregon # Região mais próxima da AWS (us-west)
    databases:
      - name: foodclub-postgres
        databaseName: foodclub
        user: foodclub_user
        plan: free
        ipAllowList: [] # Vazio = aceita conexões de qualquer IP

  # Backend API
  - type: web
    name: foodclub-backend
    env: docker
    plan: free # Opções: free, starter, standard, pro
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_HOST
        fromDatabase:
          name: foodclub-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: foodclub-postgres
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: foodclub-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: foodclub-postgres
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: foodclub-postgres
          property: database
      - key: JWT_SECRET
        generateValue: true # Gera automaticamente
      - key: JWT_EXPIRATION
        value: 7d
      - key: SEED_SECRET
        generateValue: true # Secret para endpoint de seeds
      - key: AWS_REGION
        sync: false # Variável opcional para S3
      - key: AWS_ACCESS_KEY_ID
        sync: false # Variável opcional para S3
      - key: AWS_SECRET_ACCESS_KEY
        sync: false # Variável opcional para S3
      - key: AWS_S3_BUCKET_NAME
        sync: false # Variável opcional para S3
    healthCheckPath: /health-check
    autoDeploy: true # Deploy automático ao fazer push
    branch: development # Branch que aciona deploy automático
    buildFilter:
      paths:
        - src/**
        - package.json
        - Dockerfile
        - render.yaml
